{{- $authors := .Params.authors -}}
{{- if $authors -}}
  <span class="article-metadata li-cite-author">
    {{- range $index, $author := $authors -}}
      {{- if gt $index 0 }}, {{ end -}}
      <span>
        {{- if or (eq $author "Adam K Taras") (eq $author "admin") -}}
          <strong>{{ $author }}</strong>
        {{- else -}}
          {{- $author -}}
        {{- end -}}
      </span>
    {{- end -}}
  </span>
{{- end -}}
